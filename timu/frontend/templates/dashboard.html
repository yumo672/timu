<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审批工作台</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-page="dashboard">
    <main class="page">
        <section class="panel toolbar">
            <div>
                <p class="eyebrow">Workflow Desk</p>
                <h1>采购审批工作台</h1>
                <p class="lead" id="session-summary">正在加载当前登录状态...</p>
            </div>
            <div class="actions">
                <a class="button button-secondary" href="/">首页</a>
                <a class="button button-secondary" href="/register/">注册 / 登录</a>
                <button class="button" id="logout-btn" type="button">退出登录</button>
            </div>
        </section>

        <section class="panel hidden" id="applicant-panel">
            <div class="section-head">
                <div>
                    <h2>我的采购申请</h2>
                    <p class="section-meta">支持新增、修改被打回申请并重新提交。</p>
                </div>
            </div>
            <form class="request-form" id="purchase-form">
                <input type="hidden" name="request_id">
                <label>
                    采购物品
                    <input name="item_name" placeholder="例如：办公椅">
                </label>
                <label>
                    数量
                    <input name="quantity" type="number" min="1" placeholder="1">
                </label>
                <label>
                    金额
                    <input name="amount" type="number" min="0.01" step="0.01" placeholder="1999.00">
                </label>
                <label class="full-row">
                    用途说明
                    <textarea name="purpose" rows="4" placeholder="请填写采购用途"></textarea>
                </label>
                <div class="actions">
                    <button class="button" type="submit">保存申请</button>
                    <button class="button button-secondary" id="reset-form-btn" type="button">清空表单</button>
                </div>
            </form>
        </section>

        <section class="panel">
            <div class="section-head">
                <div>
                    <h2 id="table-title">申请列表</h2>
                    <p class="section-meta" id="table-hint">正在加载数据...</p>
                </div>
            </div>
            <div class="inline-message" id="dashboard-message"></div>
            <div id="request-list" class="table-stack"></div>
        </section>
    </main>
    <script src="/static/js/app.js"></script>
</body>
</html>
